name: DeepSeek V4 Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # 每5分钟运行一次
  workflow_dispatch:          # 支持手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # 需要写权限来保存 state.json

    steps:
      - name: Checkout repo (含历史state)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt -q

      - name: Run single check
        env:
          NTFY_TOPIC:            ${{ secrets.NTFY_TOPIC }}
          MONITOR_GITHUB_TOKEN:  ${{ secrets.MONITOR_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          PRICE_ALERT_THRESHOLD: "0.04"
        run: python monitor.py --once

      - name: Save state back to repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add -f state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push || true
